<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake and Ladder Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎲 Snake and Ladder Game</h1>
        
        <div class="game-info">
            <div class="player-info player1-info">
                <h3>Player 1</h3>
                <p>Position: <span id="player1-pos">0</span></p>
                <button id="player1-btn" class="roll-btn active" onclick="rollDice(1)">Roll Dice</button>
            </div>
            
            <div class="dice-display">
                <p>Last Roll: <span id="dice-value">-</span></p>
            </div>
            
            <div class="player-info player2-info">
                <h3>Player 2</h3>
                <p>Position: <span id="player2-pos">0</span></p>
                <button id="player2-btn" class="roll-btn" onclick="rollDice(2)">Roll Dice</button>
            </div>
        </div>

        <div class="board-container">
            <div id="game-board" class="game-board"></div>
        </div>

        <div class="game-status">
            <p id="status">Player 1's Turn</p>
        </div>

        <button class="reset-btn" onclick="resetGame()">Reset Game</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
